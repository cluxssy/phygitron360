version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: phygitron_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-phygitron360}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-phygitron360}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: phygitron_backend
    restart: always
    # We load environment variables from the backend/.env file
    env_file:
      - ../backend/.env
    environment:
      # Override DB_HOST to point to the docker-compose 'db' service name
      - DB_HOST=db
      - DB_PORT=5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: phygitron_frontend
    restart: always
    ports:
      # Map host port 80 to container port 80 (Nginx)
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
